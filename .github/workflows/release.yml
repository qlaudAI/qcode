name: release

# Skeleton workflow — fires on a v* tag, builds Mac (arm64 + x86_64),
# Windows (x86_64), and Linux (x86_64). Code signing is wired but
# REQUIRES the secrets listed at the bottom of this file before it
# will produce a fully-signed release. Until those secrets exist the
# workflow ships unsigned dev artifacts (good enough for alpha).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rust-cache caches the cargo registry + git deps + target dir
      # by default. We split that: keep registry caching (downloading
      # crates.io is slow), but explicitly wipe the compiled `target/`
      # before every build. Rust incremental compilation is supposed to
      # be deterministic but in practice can leak state between tagged
      # builds — equivalent to needing `rm -rf .next` on Next.js. The
      # `cache-targets: false` opt-out tells the action to NOT save or
      # restore target/, only the dep registries.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-targets: false

      - name: Force clean build artifacts
        shell: bash
        run: |
          # Belt-and-suspenders. If anything got restored above (or the
          # checkout left stale dist/), nuke it. Cargo registry under
          # ~/.cargo/registry is preserved by rust-cache so dep
          # downloads still hit cache — only build outputs are reset.
          rm -rf src-tauri/target dist node_modules/.vite tsconfig.tsbuildinfo
          echo "post-wipe paths:"
          ls src-tauri/target 2>/dev/null || echo "  src-tauri/target: (clean)"
          ls dist 2>/dev/null            || echo "  dist: (clean)"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile=false

      # Ripgrep is bundled as a Tauri sidecar via tauri.conf.json's
      # bundle.externalBin. Tauri picks the file matching the build's
      # target triple; CI downloads the right binary for each matrix
      # entry into src-tauri/binaries/rg-<triple>(.exe).
      #
      # Why bundle: rg makes file search 10-50× faster on big repos,
      # but it's not on every developer's PATH. Shipping a copy adds
      # ~5-7 MB to the .dmg / .exe and eliminates the "install rg"
      # friction. Same approach Claude Code uses.
      - name: Download ripgrep sidecar (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          RG_VERSION=14.1.1
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              URL="https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-aarch64-apple-darwin.tar.gz"
              ;;
            x86_64-apple-darwin)
              URL="https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-x86_64-apple-darwin.tar.gz"
              ;;
            x86_64-unknown-linux-gnu)
              # musl static build — more portable across distros.
              URL="https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-x86_64-unknown-linux-musl.tar.gz"
              ;;
            *)
              echo "no rg download mapping for ${{ matrix.target }}"; exit 1 ;;
          esac
          mkdir -p src-tauri/binaries
          curl -L -o /tmp/rg.tar.gz "$URL"
          tar -xzf /tmp/rg.tar.gz -C /tmp
          mv /tmp/ripgrep-$RG_VERSION-*/rg src-tauri/binaries/rg-${{ matrix.target }}
          chmod +x src-tauri/binaries/rg-${{ matrix.target }}
          ls -la src-tauri/binaries/

      - name: Download ripgrep sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $RG_VERSION = "14.1.1"
          $URL = "https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Invoke-WebRequest -Uri $URL -OutFile $env:TEMP\rg.zip
          Expand-Archive -Path $env:TEMP\rg.zip -DestinationPath $env:TEMP\rg-extracted -Force
          $rgPath = Get-ChildItem -Path $env:TEMP\rg-extracted -Recurse -Filter rg.exe | Select-Object -First 1
          Copy-Item $rgPath.FullName -Destination "src-tauri\binaries\rg-${{ matrix.target }}.exe"
          Get-ChildItem src-tauri\binaries

      - name: Build Tauri release
        env:
          # Mac signing secrets (set in repo settings):
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater (set after running `pnpm tauri signer generate`):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # PostHog product analytics (web + desktop share the same
          # project as the qlaud dashboard so funnels span surfaces).
          # Both vars are PUBLIC project tokens, safe to expose in the
          # client bundle. Set in repo settings under Variables, not
          # Secrets — they're not sensitive.
          VITE_POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_POSTHOG_PROJECT_TOKEN }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          # Stamp the release version into the bundle so PostHog
          # super-properties surface "qcode_version: 0.1.0-alpha.NN"
          # on every event for cohort breakdowns.
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: pnpm tauri build --target ${{ matrix.target }}

      # Tauri's macOS bundler always names the updater payload
      # `qcode.app.tar.gz` regardless of arch, so the arm64 + x86_64
      # matrix runs collide on upload (last writer wins). Rename per
      # target so both arches survive in the GH Release, and so the
      # edge worker's pickUpdaterAsset can match by the arch substring
      # in the filename.
      - name: Rename macOS updater bundle with target arch
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          if [ -f qcode.app.tar.gz ]; then
            mv qcode.app.tar.gz "qcode_${{ matrix.target }}.app.tar.gz"
            mv qcode.app.tar.gz.sig "qcode_${{ matrix.target }}.app.tar.gz.sig"
            ls -la qcode_*.app.tar.gz qcode_*.app.tar.gz.sig
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          # Two flavors of artifact go into every release:
          #
          # 1. Human-install assets — what users click on a fresh
          #    machine. .dmg / .msi / .exe / .AppImage / .deb.
          #
          # 2. Updater bundles + their detached signatures — what
          #    the in-app auto-updater fetches. The qlaud.ai
          #    release-channels route reads these by Tauri's
          #    naming convention:
          #      darwin → *.app.tar.gz (+ .sig)
          #      linux  → *.AppImage.tar.gz (+ .sig)
          #      win    → *.nsis.zip (+ .sig)
          #    Without the .sig sibling the updater route 204s
          #    deliberately — we never ship an unverifiable update.
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.nsis.zip.sig

  # Tell the qlaud edge worker to rebuild its release manifest in KV.
  # The dashboard's /qcode/download/* and /qcode/release-channels/*
  # routes both read from that manifest, so this is what makes a new
  # version visible to users (humans clicking download + existing
  # installs auto-updating) within seconds of the build job finishing.
  # Without this hook the manifest still refreshes hourly via the cron
  # in apps/edge — this just shortens the window.
  notify-qlaud:
    name: Refresh qlaud release manifest
    runs-on: ubuntu-22.04
    needs: build
    if: success()
    steps:
      - name: POST /webhooks/qcode-release-refresh
        env:
          QCODE_REFRESH_TOKEN: ${{ secrets.QCODE_REFRESH_TOKEN }}
        run: |
          if [ -z "$QCODE_REFRESH_TOKEN" ]; then
            echo "QCODE_REFRESH_TOKEN secret not set — skipping. Add it under repo secrets to enable instant manifest refresh." >&2
            exit 0
          fi
          # Don't fail the workflow if the refresh hook is unreachable —
          # the hourly cron will pick up the release within an hour.
          # We still want a clear log line either way.
          status=$(curl -sS -o /tmp/refresh.json -w '%{http_code}' \
            -X POST \
            -H "authorization: Bearer $QCODE_REFRESH_TOKEN" \
            -H "content-type: application/json" \
            https://api.qlaud.ai/webhooks/qcode-release-refresh) || status="000"
          echo "refresh status: $status"
          cat /tmp/refresh.json || true
          if [ "$status" != "200" ]; then
            echo "::warning::Manifest refresh returned $status — relying on the hourly cron."
          fi

# ─── First-release checklist ──────────────────────────────────────
#
# 1. Generate a Tauri signing key pair on your machine:
#      pnpm tauri signer generate -w ~/.tauri/qcode.key
#    Print the public key:
#      cat ~/.tauri/qcode.key.pub
#    Replace the "REPLACE_WITH_TAURI_GENERATED_PUBKEY" placeholder in
#    src-tauri/tauri.conf.json's plugins.updater.pubkey field.
#
# 2. Add the secrets below to the qcode repo
#    (Settings → Secrets and variables → Actions).
#
# 3. Apple Developer cert: export your "Developer ID Application"
#    cert from Keychain.app as a .p12, then base64-encode:
#      base64 -i Certificates.p12 -o cert.b64
#    Paste the contents of cert.b64 into APPLE_CERTIFICATE.
#
# 4. Apple app-specific password: appleid.apple.com → Sign-in &
#    Security → App-Specific Passwords → Generate. Pase into
#    APPLE_PASSWORD.
#
# 5. Tag a release: `git tag v0.1.0-alpha.5 && git push --tags`.
#    The workflow runs on every v* tag.
#
# 6. The qlaud.ai/qcode/release-channels/... route picks up the new
#    GitHub Release automatically (5-min edge cache). Existing
#    qcode installs prompt to update on next launch.
#
# Until the secrets land the workflow still runs — but it ships
# unsigned dev artifacts only. Tauri's bundler skips signing when
# the env vars are empty rather than failing the build, so partial
# setups still produce installable .dmg/.exe (just not auto-update
# capable).
#
# ─── Required secrets ─────────────────────────────────────────────
#
#   APPLE_CERTIFICATE                — base64 .p12 from Apple Developer
#   APPLE_CERTIFICATE_PASSWORD       — password used when exporting
#   APPLE_SIGNING_IDENTITY           — "Developer ID Application: ..."
#   APPLE_ID                         — Apple ID for notarization
#   APPLE_PASSWORD                   — app-specific password
#   APPLE_TEAM_ID                    — 10-char Apple team identifier
#   TAURI_SIGNING_PRIVATE_KEY        — generated with `pnpm tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
