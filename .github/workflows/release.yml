name: release

# Skeleton workflow — fires on a v* tag, builds Mac (arm64 + x86_64),
# Windows (x86_64), and Linux (x86_64). Code signing is wired but
# REQUIRES the secrets listed at the bottom of this file before it
# will produce a fully-signed release. Until those secrets exist the
# workflow ships unsigned dev artifacts (good enough for alpha).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            arch: x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Bun replaces pnpm here for ~10x install speed (3-5s vs 25-30s).
      # Same lockfile shape — bun migrates pnpm-lock.yaml to bun.lock
      # automatically on first `bun install`.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # rust-cache caches the cargo registry + git deps + target dir
      # by default. We split that: keep registry caching (downloading
      # crates.io is slow), but explicitly wipe the compiled `target/`
      # before every build. Rust incremental compilation is supposed to
      # be deterministic but in practice can leak state between tagged
      # builds — equivalent to needing `rm -rf .next` on Next.js. The
      # `cache-targets: false` opt-out tells the action to NOT save or
      # restore target/, only the dep registries.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-targets: false

      - name: Force clean build artifacts
        shell: bash
        run: |
          # Belt-and-suspenders. If anything got restored above (or the
          # checkout left stale dist/), nuke it. Cargo registry under
          # ~/.cargo/registry is preserved by rust-cache so dep
          # downloads still hit cache — only build outputs are reset.
          rm -rf src-tauri/target dist node_modules/.vite tsconfig.tsbuildinfo
          echo "post-wipe paths:"
          ls src-tauri/target 2>/dev/null || echo "  src-tauri/target: (clean)"
          ls dist 2>/dev/null            || echo "  dist: (clean)"

      - name: Install JS deps
        run: bun install --frozen-lockfile

      # Ripgrep is bundled as a Tauri sidecar via tauri.conf.json's
      # bundle.externalBin. Tauri picks the file matching the build's
      # target triple; CI downloads the right binary for each matrix
      # entry into src-tauri/binaries/rg-<triple>(.exe).
      #
      # Why bundle: rg makes file search 10-50× faster on big repos,
      # but it's not on every developer's PATH. Shipping a copy adds
      # ~5-7 MB to the .dmg / .exe and eliminates the "install rg"
      # friction. Same approach Claude Code uses.
      - name: Download ripgrep sidecar (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          RG_VERSION=14.1.1
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              URL="https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-aarch64-apple-darwin.tar.gz"
              ;;
            x86_64-apple-darwin)
              URL="https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-x86_64-apple-darwin.tar.gz"
              ;;
            x86_64-unknown-linux-gnu)
              # musl static build — more portable across distros.
              URL="https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-x86_64-unknown-linux-musl.tar.gz"
              ;;
            *)
              echo "no rg download mapping for ${{ matrix.target }}"; exit 1 ;;
          esac
          mkdir -p src-tauri/binaries
          curl -L -o /tmp/rg.tar.gz "$URL"
          tar -xzf /tmp/rg.tar.gz -C /tmp
          mv /tmp/ripgrep-$RG_VERSION-*/rg src-tauri/binaries/rg-${{ matrix.target }}
          chmod +x src-tauri/binaries/rg-${{ matrix.target }}
          ls -la src-tauri/binaries/

      - name: Download ripgrep sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $RG_VERSION = "14.1.1"
          $URL = "https://github.com/BurntSushi/ripgrep/releases/download/$RG_VERSION/ripgrep-$RG_VERSION-x86_64-pc-windows-msvc.zip"
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Invoke-WebRequest -Uri $URL -OutFile $env:TEMP\rg.zip
          Expand-Archive -Path $env:TEMP\rg.zip -DestinationPath $env:TEMP\rg-extracted -Force
          $rgPath = Get-ChildItem -Path $env:TEMP\rg-extracted -Recurse -Filter rg.exe | Select-Object -First 1
          Copy-Item $rgPath.FullName -Destination "src-tauri\binaries\rg-${{ matrix.target }}.exe"
          Get-ChildItem src-tauri\binaries

      # Bun is the JS runtime + package manager bundled with qcode so
      # claude-code (a node CLI) runs without the user having Node or
      # bun installed themselves. Per-target downloads mirror the rg
      # pattern above. ~58MB per platform — sized accordingly into the
      # final dmg/exe/AppImage.
      - name: Download bun sidecar (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          BUN_VERSION="1.3.11"
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) ZIP="bun-darwin-aarch64.zip" ;;
            x86_64-apple-darwin)  ZIP="bun-darwin-x64.zip" ;;
            x86_64-unknown-linux-gnu) ZIP="bun-linux-x64.zip" ;;
            *) echo "no bun mapping for ${{ matrix.target }}"; exit 1 ;;
          esac
          URL="https://github.com/oven-sh/bun/releases/download/bun-v$BUN_VERSION/$ZIP"
          mkdir -p src-tauri/binaries
          curl -L -o /tmp/bun.zip "$URL"
          unzip -o -j /tmp/bun.zip -d /tmp/bun-extracted
          mv /tmp/bun-extracted/bun src-tauri/binaries/bun-${{ matrix.target }}
          chmod +x src-tauri/binaries/bun-${{ matrix.target }}
          ls -la src-tauri/binaries/

      - name: Download bun sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $BUN_VERSION = "1.3.11"
          $URL = "https://github.com/oven-sh/bun/releases/download/bun-v$BUN_VERSION/bun-windows-x64.zip"
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          Invoke-WebRequest -Uri $URL -OutFile $env:TEMP\bun.zip
          Expand-Archive -Path $env:TEMP\bun.zip -DestinationPath $env:TEMP\bun-extracted -Force
          $bunPath = Get-ChildItem -Path $env:TEMP\bun-extracted -Recurse -Filter bun.exe | Select-Object -First 1
          Copy-Item $bunPath.FullName -Destination "src-tauri\binaries\bun-${{ matrix.target }}.exe"
          Get-ChildItem src-tauri\binaries

      # Pre-install @anthropic-ai/claude-code into qcode's resources
      # dir using the bun sidecar we just downloaded. Bun picks up
      # the right per-platform claude native binary subpackage
      # (claude-code-darwin-arm64 / -x64 / linux-x64 / win32-x64)
      # automatically based on the runner's OS+arch. The resulting
      # node_modules tree gets bundled into qcode's .app/.exe by
      # tauri.conf.json's bundle.resources entry, so end users have
      # claude pre-installed at first launch.
      - name: Bundle claude code runtime (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -e
          ./src-tauri/binaries/bun-${{ matrix.target }} \
            install --cwd src-tauri/resources/runtime --production
          ls -la src-tauri/resources/runtime/node_modules/@anthropic-ai/

      - name: Bundle claude code runtime (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          & .\src-tauri\binaries\bun-${{ matrix.target }}.exe install --cwd src-tauri\resources\runtime --production
          Get-ChildItem src-tauri\resources\runtime\node_modules\@anthropic-ai\

      - name: Build Tauri release
        env:
          # Mac signing secrets (set in repo settings):
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater (set after running `pnpm tauri signer generate`):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # PostHog product analytics (web + desktop share the same
          # project as the qlaud dashboard so funnels span surfaces).
          # Both vars are PUBLIC project tokens, safe to expose in the
          # client bundle. Set in repo settings under Variables, not
          # Secrets — they're not sensitive.
          VITE_POSTHOG_PROJECT_TOKEN: ${{ vars.VITE_POSTHOG_PROJECT_TOKEN }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
          # Stamp the release version into the bundle so PostHog
          # super-properties surface "qcode_version: 0.1.0-alpha.NN"
          # on every event for cohort breakdowns.
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: bunx tauri build --target ${{ matrix.target }}

      # Tauri's macOS bundler always names the updater payload
      # `qcode.app.tar.gz` regardless of arch, so the arm64 + x86_64
      # matrix runs collide on upload (last writer wins). Rename per
      # target so both arches survive in the GH Release, and so the
      # edge worker's pickUpdaterAsset can match by the arch substring
      # in the filename.
      - name: Rename macOS updater bundle with target arch
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          if [ -f qcode.app.tar.gz ]; then
            mv qcode.app.tar.gz "qcode_${{ matrix.target }}.app.tar.gz"
            mv qcode.app.tar.gz.sig "qcode_${{ matrix.target }}.app.tar.gz.sig"
            ls -la qcode_*.app.tar.gz qcode_*.app.tar.gz.sig
          fi

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          # Two flavors of artifact go into every release:
          #
          # 1. Human-install assets — what users click on a fresh
          #    machine. .dmg / .msi / .exe / .AppImage / .deb.
          #
          # 2. Updater bundles + their detached signatures — what
          #    the in-app auto-updater fetches. The qlaud.ai
          #    release-channels route reads these by Tauri's
          #    naming convention:
          #      darwin → *.app.tar.gz (+ .sig)
          #      linux  → *.AppImage.tar.gz (+ .sig)
          #      win    → *.nsis.zip (+ .sig)
          #    Without the .sig sibling the updater route 204s
          #    deliberately — we never ship an unverifiable update.
          # Subdir-specific globs (NOT recursive **). alpha.103+
          # bundles claude code's runtime tree inside qcode.app —
          # which means recursive globs like **/*.exe pick up
          # claude.exe (a 500B stub) and ship it as a release asset
          # alongside the actual qcode_*_x64-setup.exe. With
          # subdir-specific paths we only catch the bundler's own
          # output, never the bundled resources.
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

  # Tell the qlaud edge worker to rebuild its release manifest in KV.
  # The dashboard's /qcode/download/* and /qcode/release-channels/*
  # routes both read from that manifest, so this is what makes a new
  # version visible to users (humans clicking download + existing
  # installs auto-updating) within seconds of the build job finishing.
  # Without this hook the manifest still refreshes hourly via the cron
  # in apps/edge — this just shortens the window.
  publish-to-qlaud:
    # CI-side mirror: takes the assets we just published to GitHub
    # release, uploads them to qlaud's R2 bucket (so the public install
    # path doesn't need a GitHub PAT to read a private repo), and pushes
    # a manifest to qlaud-edge that's ready to serve. Replaces the
    # previous "qlaud-edge fetches GitHub" flow that broke whenever the
    # GITHUB_RELEASE_PAT lost access.
    name: Publish manifest + mirror assets to qlaud R2
    runs-on: ubuntu-22.04
    needs: build
    if: success()
    steps:
      # gh CLI uses repo metadata from the local git config (or
      # GH_REPO env) to know which repo to query. Without checkout,
      # `gh release view` errors with "fatal: not a git repository"
      # — which is exactly what failed run 25621012576 in.
      # Sparse checkout because we don't need source files; just
      # the .git folder so gh can resolve the repo.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: false

      - name: Resolve tag + assets
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
          # Belt-and-suspenders: explicit repo override so `gh` doesn't
          # depend on local git config detection. Even if the checkout
          # step above somehow doesn't expose .git/config the way `gh`
          # expects, the explicit GH_REPO short-circuits the lookup.
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ]; then
            echo "GITHUB_REF_NAME unset (not a tag push?); aborting publish step" >&2
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/release
          gh release view "$TAG" --json publishedAt,body,assets > /tmp/release/info.json
          gh release download "$TAG" -D /tmp/release/assets --clobber

      - name: Upload assets to R2 (S3 API)
        # Mirrors every asset to qlaud-qcode-releases R2 bucket under
        # the key <tag>/<filename>. R2 has an S3-compatible endpoint;
        # aws-cli is pre-installed on ubuntu-22.04 runners so no setup.
        # Required secrets:
        #   R2_ACCOUNT_ID       — CF account id that owns the bucket
        #   R2_ACCESS_KEY_ID    — CF R2 API token's access key
        #   R2_SECRET_ACCESS_KEY — CF R2 API token's secret
        # Create one-time at https://dash.cloudflare.com/?to=/:account/r2/api-tokens
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ]; then
            echo "::warning::R2_* secrets missing — skipping mirror. Releases will only resolve via GitHub fallback (requires PAT)."
            exit 0
          fi
          # Configure aws-cli for the R2 endpoint. R2 ignores region but
          # the SDK insists on one; 'auto' is the documented sentinel.
          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION=auto
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          for f in /tmp/release/assets/*; do
            NAME=$(basename "$f")
            KEY="${TAG}/${NAME}"
            echo "→ R2 ${KEY}"
            aws s3 cp "$f" "s3://qlaud-qcode-releases/${KEY}" \
              --endpoint-url="$ENDPOINT" \
              --no-progress
          done

      - name: Build manifest JSON
        # Construct the same shape qlaud-edge's refreshQcodeReleaseManifest
        # produces server-side, but with all fields resolved from the
        # release info we have locally — no GitHub API call needed at
        # qlaud-edge runtime.
        env:
          TAG: ${{ steps.rel.outputs.tag }}
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          python3 <<'PYEOF' > /tmp/release/manifest.json
          import json, os, glob, base64
          tag = os.environ['TAG']
          version = os.environ['VERSION']
          info = json.load(open('/tmp/release/info.json'))
          assets = info['assets']
          asset_by_name = {a['name']: a for a in assets}

          def pick_dl(name):
              n = name.lower()
              if n.endswith(('.sig','.tar.gz','.zip')): return None
              if 'aarch64.dmg' in n: return 'mac-arm64'
              if 'x64.dmg' in n: return 'mac-x64'
              if 'x64-setup.exe' in n: return 'windows'
              if n.endswith(('.appimage','.deb')): return 'linux'
              return None

          def pick_upd(name):
              n = name.lower()
              if not (n.endswith('.app.tar.gz') or n.endswith('.nsis.zip') or n.endswith('.appimage.tar.gz')):
                  return None
              if 'aarch64-apple-darwin' in n: return 'darwin-aarch64'
              if 'x86_64-apple-darwin' in n: return 'darwin-x86_64'
              if 'linux' in n: return 'linux-x86_64'
              if 'windows' in n or 'nsis' in n: return 'windows-x86_64'
              return None

          downloads = {}
          updater = {}
          for a in assets:
              p = pick_dl(a['name'])
              if p:
                  # api_url left blank — the R2 mirror is the canonical
                  # download path now; api_url is a legacy fallback.
                  downloads[p] = {
                      'url': a.get('url') or '',
                      'name': a['name'],
                      'size': a['size'],
                  }
              u = pick_upd(a['name'])
              if u:
                  sig_path = f"/tmp/release/assets/{a['name']}.sig"
                  if os.path.exists(sig_path):
                      with open(sig_path) as fh:
                          signature = fh.read().strip()
                      updater[u] = {
                          'url': a.get('url') or '',
                          'name': a['name'],
                          'size': a['size'],
                          'signature': signature,
                      }

          print(json.dumps({
              'version': version,
              'tag': tag,
              'published_at': info['publishedAt'],
              'notes': info.get('body') or '',
              'refreshed_at': info['publishedAt'],
              'downloads': downloads,
              'updater': updater,
          }))
          PYEOF
          echo "Manifest preview:"
          jq '{version, tag, downloads: (.downloads | keys), updater: (.updater | keys)}' /tmp/release/manifest.json

      - name: POST manifest to qlaud-edge
        env:
          QCODE_REFRESH_TOKEN: ${{ secrets.QCODE_REFRESH_TOKEN }}
        run: |
          if [ -z "$QCODE_REFRESH_TOKEN" ]; then
            echo "::warning::QCODE_REFRESH_TOKEN missing — manifest not pushed. Set the secret to enable."
            exit 0
          fi
          # Wrap manifest in body envelope { manifest: {...} } as the
          # /webhooks/qcode-release-refresh handler expects.
          jq '{manifest: .}' /tmp/release/manifest.json > /tmp/release/payload.json
          status=$(curl -sS -o /tmp/refresh.json -w '%{http_code}' \
            -X POST \
            -H "authorization: Bearer $QCODE_REFRESH_TOKEN" \
            -H "content-type: application/json" \
            --data-binary @/tmp/release/payload.json \
            https://api.qlaud.ai/webhooks/qcode-release-refresh) || status="000"
          echo "manifest publish status: $status"
          cat /tmp/refresh.json || true
          if [ "$status" != "200" ]; then
            echo "::error::Manifest publish returned $status — install path will serve the previous version until next CI run."
            exit 1
          fi

# ─── First-release checklist ──────────────────────────────────────
#
# 1. Generate a Tauri signing key pair on your machine:
#      pnpm tauri signer generate -w ~/.tauri/qcode.key
#    Print the public key:
#      cat ~/.tauri/qcode.key.pub
#    Replace the "REPLACE_WITH_TAURI_GENERATED_PUBKEY" placeholder in
#    src-tauri/tauri.conf.json's plugins.updater.pubkey field.
#
# 2. Add the secrets below to the qcode repo
#    (Settings → Secrets and variables → Actions).
#
# 3. Apple Developer cert: export your "Developer ID Application"
#    cert from Keychain.app as a .p12, then base64-encode:
#      base64 -i Certificates.p12 -o cert.b64
#    Paste the contents of cert.b64 into APPLE_CERTIFICATE.
#
# 4. Apple app-specific password: appleid.apple.com → Sign-in &
#    Security → App-Specific Passwords → Generate. Pase into
#    APPLE_PASSWORD.
#
# 5. Tag a release: `git tag v0.1.0-alpha.5 && git push --tags`.
#    The workflow runs on every v* tag.
#
# 6. The qlaud.ai/qcode/release-channels/... route picks up the new
#    GitHub Release automatically (5-min edge cache). Existing
#    qcode installs prompt to update on next launch.
#
# Until the secrets land the workflow still runs — but it ships
# unsigned dev artifacts only. Tauri's bundler skips signing when
# the env vars are empty rather than failing the build, so partial
# setups still produce installable .dmg/.exe (just not auto-update
# capable).
#
# ─── Required secrets ─────────────────────────────────────────────
#
#   APPLE_CERTIFICATE                — base64 .p12 from Apple Developer
#   APPLE_CERTIFICATE_PASSWORD       — password used when exporting
#   APPLE_SIGNING_IDENTITY           — "Developer ID Application: ..."
#   APPLE_ID                         — Apple ID for notarization
#   APPLE_PASSWORD                   — app-specific password
#   APPLE_TEAM_ID                    — 10-char Apple team identifier
#   TAURI_SIGNING_PRIVATE_KEY        — generated with `pnpm tauri signer generate`
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
